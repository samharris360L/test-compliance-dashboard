<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>360Learning · Courses overview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=JetBrains+Mono:wght@400;600&family=Inter+Tight:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0e0c;
        --surface: #171613;
        --surface-2: #1e1c18;
        --border: #2a2824;
        --ink: #f0ece3;
        --ink-dim: #8a8578;
        --accent: #e8c547;
        --danger: #d86b5a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
      body {
        font-family: "Inter Tight", -apple-system, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        min-height: 100vh;
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,197,71,0.08), transparent),
          radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232,197,71,0.04), transparent);
      }
      .wrap { max-width: 1080px; margin: 0 auto; padding: 72px 32px 96px; }

      header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 48px; }
      header .brand { font-family: "Fraunces", serif; font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-dim); font-weight: 500; }
      header .stamp { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-dim); }
      header .stamp .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-right: 8px; vertical-align: middle; box-shadow: 0 0 12px var(--accent); }

      h1 { font-family: "Fraunces", serif; font-weight: 300; font-size: clamp(44px, 6vw, 72px); line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 12px; font-variation-settings: "opsz" 144; }
      h1 em { font-style: italic; color: var(--accent); font-weight: 500; }
      .sub { color: var(--ink-dim); font-size: 17px; max-width: 52ch; margin-bottom: 64px; }

      .hero-number { display: flex; align-items: baseline; gap: 20px; margin: 56px 0 72px; padding: 40px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
      .hero-number .big { font-family: "Fraunces", serif; font-weight: 300; font-size: clamp(96px, 14vw, 160px); line-height: 1; letter-spacing: -0.04em; font-variation-settings: "opsz" 144; }
      .hero-number .label { font-family: "JetBrains Mono", monospace; font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-dim); }

      .section-title { font-family: "JetBrains Mono", monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--ink-dim); margin: 0 0 24px; display: flex; align-items: center; gap: 12px; }
      .section-title::before { content: ""; width: 24px; height: 1px; background: var(--accent); }

      .breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 72px; }
      .breakdown .cell { background: var(--surface); padding: 24px 20px; }
      .breakdown .cell .k { font-family: "JetBrains Mono", monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-dim); margin-bottom: 8px; }
      .breakdown .cell .v { font-family: "Fraunces", serif; font-size: 36px; font-weight: 400; }

      .recent { margin-top: 16px; }
      .recent .row { display: grid; grid-template-columns: 32px 1fr auto auto; gap: 20px; align-items: baseline; padding: 18px 0; border-bottom: 1px solid var(--border); }
      .recent .row:last-child { border-bottom: none; }
      .recent .idx { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-dim); }
      .recent .name { font-family: "Fraunces", serif; font-size: 19px; font-weight: 400; }
      .recent .lang { font-family: "JetBrains Mono", monospace; font-size: 11px; text-transform: uppercase; color: var(--ink-dim); padding: 3px 8px; border: 1px solid var(--border); border-radius: 2px; }
      .recent .date { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-dim); }

      .state { padding: 80px 24px; text-align: center; font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--ink-dim); }
      .state.err { color: var(--danger); }

      footer { margin-top: 96px; padding-top: 24px; border-top: 1px solid var(--border); font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-dim); display: flex; justify-content: space-between; }

      @media (max-width: 600px) {
        .wrap { padding: 40px 20px 64px; }
        .recent .row { grid-template-columns: 24px 1fr; gap: 12px; }
        .recent .lang, .recent .date { grid-column: 2; padding-left: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">360Learning · Overview</div>
        <div class="stamp"><span class="dot"></span><span id="stamp">loading…</span></div>
      </header>

      <h1>Courses <em>at a glance.</em></h1>
      <p class="sub">A summary of your 360Learning course catalogue, refreshed hourly from the live API.</p>

      <div id="content">
        <div class="state">Loading data…</div>
      </div>

      <footer>
        <span>Auto-refreshed via GitHub Actions</span>
        <span id="source">—</span>
      </footer>
    </div>

    <script>
      const fmtDate = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        return isNaN(d) ? "—" : d.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" });
      };
      const fmtRelative = (iso) => {
        if (!iso) return "—";
        const d = new Date(iso);
        if (isNaN(d)) return "—";
        const mins = Math.round((Date.now() - d.getTime()) / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return mins + " min ago";
        const hrs = Math.round(mins / 60);
        if (hrs < 24) return hrs + "h ago";
        return Math.round(hrs / 24) + "d ago";
      };

      function render(data) {
        const content = document.getElementById("content");
        const stamp = document.getElementById("stamp");
        const source = document.getElementById("source");

        stamp.textContent = "updated " + fmtRelative(data.generatedAt);
        source.textContent = "generated " + fmtDate(data.generatedAt);

        const langEntries = Object.entries(data.byLanguage || {}).sort((a, b) => b[1] - a[1]);

        const breakdownHTML = langEntries.length
          ? `
            <div class="section-title">By language</div>
            <div class="breakdown">
              ${langEntries.map(([k, v]) => `
                <div class="cell">
                  <div class="k">${k}</div>
                  <div class="v">${v}</div>
                </div>
              `).join("")}
            </div>
          `
          : "";

        const recentHTML = (data.recent || []).length
          ? `
            <div class="section-title">Recent courses</div>
            <div class="recent">
              ${data.recent.map((r, i) => `
                <div class="row">
                  <span class="idx">${String(i + 1).padStart(2, "0")}</span>
                  <span class="name">${escapeHtml(r.name)}</span>
                  <span class="lang">${escapeHtml(r.language || "—")}</span>
                  <span class="date">${fmtDate(r.createdAt)}</span>
                </div>
              `).join("")}
            </div>
          `
          : `<div class="state">No courses returned.</div>`;

        content.innerHTML = `
          <div class="hero-number">
            <span class="big">${(data.totalCourses ?? 0).toLocaleString()}</span>
            <span class="label">total courses</span>
          </div>
          ${breakdownHTML}
          ${recentHTML}
        `;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }

      fetch("data.json?ts=" + Date.now())
        .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
        .then(render)
        .catch((err) => {
          document.getElementById("content").innerHTML =
            `<div class="state err">Couldn't load data.json — has the workflow run yet?<br/>(${escapeHtml(err.message)})</div>`;
          document.getElementById("stamp").textContent = "error";
        });
    </script>
  </body>
</html>
